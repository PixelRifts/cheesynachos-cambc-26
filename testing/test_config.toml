# Test runner config for testing/run_tests.py

# Bot to evaluate
target_bot = "sprint4_unify"
# target_bot = "sprint3_core"

# Opponents to test against.
# Use ["all"] to include all bots except target_bot.
opponents = ["test1_no_prot"]

# Maps to run.
# Use ["all"] to include all *.map26 files.
# Use "sample10" or "sample20" to sample a random set of 10/20 maps
# maps = ["all"]
maps = ["all"]

# Execution settings
threads = 15
matches_per = 2
seed = 1
save_csv = true

results_dir = "results"
